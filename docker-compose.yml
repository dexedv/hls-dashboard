services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hls-app
    restart: unless-stopped
    volumes:
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hls-network

  nginx:
    image: nginx:1.25-alpine
    container_name: hls-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - hls-network

  postgres:
    image: postgres:16-alpine
    container_name: hls-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hls_dashboard}
      POSTGRES_USER: ${DB_USERNAME:-hls}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hls} -d ${DB_DATABASE:-hls_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hls-network

  redis:
    image: redis:7-alpine
    container_name: hls-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hls-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hls-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - hls-network

volumes:
  app-storage:
  app-public:
  postgres-data:
  redis-data:

networks:
  hls-network:
    driver: bridge
