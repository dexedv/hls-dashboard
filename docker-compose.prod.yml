# HLS Dashboard - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required: Copy .env.example to .env.docker and configure all values
# SSL: Place certificates in ./docker/ssl/ (cert.pem + key.pem)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hls-app
    restart: unless-stopped
    volumes:
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hls-network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.25-alpine
    container_name: hls-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - app-public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - hls-network

  postgres:
    image: postgres:16-alpine
    container_name: hls-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hls_dashboard}
      POSTGRES_USER: ${DB_USERNAME:-hls}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hls} -d ${DB_DATABASE:-hls_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hls-network

  redis:
    image: redis:7-alpine
    container_name: hls-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hls-network

volumes:
  app-storage:
  app-public:
  postgres-data:
  redis-data:

networks:
  hls-network:
    driver: bridge
